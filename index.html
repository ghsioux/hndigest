<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker News Digest</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f6f6ef;
      --cp-bg-elevated: #f6f6ef;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f0ebe4;
      --cp-border: #e0d8ce;
      --cp-border-strong: #cccccc;
      --cp-text: #333333;
      --cp-text-muted: #444444;
      --cp-text-soft: #999999;
      --cp-accent: #ff6600;
      --cp-accent-hover: #ff6600;
      --cp-accent-soft: #ffecd2;
      --cp-accent-fg: #000000;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 0 2px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.14);
      --cp-overlay: rgba(255, 255, 255, 0.8);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.55);
      --cp-highlight: #ffecd2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Verdana, Geneva, sans-serif;
      background: var(--cp-bg);
      color: var(--cp-text);
      min-height: 100vh;
    }

    header {
      background: var(--cp-accent);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 18px;
      height: 18px;
      background: var(--cp-surface);
      border: 1px solid var(--cp-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      color: var(--cp-accent);
    }

    header h1 {
      font-size: 14px;
      font-weight: bold;
      color: var(--cp-accent-fg);
    }

    header h1 a {
      color: var(--cp-accent-fg);
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 38px);
    }

    /* --- Calendar sidebar --- */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--cp-bg);
      border-right: 1px solid var(--cp-border);
      padding: 16px;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cal-nav button {
      background: none;
      border: 1px solid var(--cp-border);
      border-radius: 3px;
      cursor: pointer;
      padding: 2px 8px;
      font-size: 13px;
      color: var(--cp-text-muted);
    }

    .cal-nav button:hover { background: var(--cp-surface-soft); }

    .cal-nav .cal-title {
      font-size: 13px;
      font-weight: bold;
      color: var(--cp-text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
      font-size: 12px;
    }

    .cal-grid .day-header {
      font-weight: bold;
      color: var(--cp-text-soft);
      padding: 4px 0;
      font-size: 10px;
    }

    .cal-grid .day {
      padding: 6px 2px;
      border-radius: 3px;
      cursor: default;
      color: var(--cp-text-soft);
      opacity: 0.5;
      font-size: 12px;
    }

    .cal-grid .day.has-digest {
      color: var(--cp-text);
      opacity: 1;
      cursor: pointer;
      font-weight: bold;
    }

    .cal-grid .day.has-digest:hover {
      background: var(--cp-accent-soft);
    }

    .cal-grid .day.has-digest::after {
      content: '';
      display: block;
      width: 4px;
      height: 4px;
      background: var(--cp-accent);
      border-radius: 50%;
      margin: 2px auto 0;
    }

    .cal-grid .day.selected {
      background: var(--cp-accent);
      color: var(--cp-accent-fg);
      opacity: 1;
    }

    .cal-grid .day.selected::after {
      background: var(--cp-accent-fg);
    }

    .cal-grid .day.today {
      outline: 2px solid var(--cp-accent);
      outline-offset: -2px;
    }

    .cal-grid .day.empty {
      visibility: hidden;
    }

    .digest-list {
      margin-top: 20px;
      border-top: 1px solid var(--cp-border);
      padding-top: 12px;
    }

    .digest-list h3 {
      font-size: 11px;
      color: var(--cp-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .digest-list a {
      display: block;
      font-size: 12px;
      color: var(--cp-text-muted);
      text-decoration: none;
      padding: 3px 0;
    }

    .digest-list a:hover { color: var(--cp-accent); }
    .digest-list a.active { color: var(--cp-accent); font-weight: bold; }

    /* --- Main content --- */
    .content {
      flex: 1;
      padding: 24px 32px;
      max-width: 800px;
      overflow-y: auto;
    }

    .content .empty-state {
      color: var(--cp-text-soft);
      font-size: 13px;
      margin-top: 40px;
      text-align: center;
    }

    .content .empty-state .arrow {
      font-size: 24px;
      display: block;
      margin-bottom: 8px;
    }

    /* Markdown rendered styles */
    .content h1 {
      font-size: 16px;
      color: var(--cp-text);
      margin-bottom: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--cp-border);
    }

    .content h2 {
      font-size: 13px;
      color: var(--cp-accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .content h3 {
      font-size: 13px;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    .content h3 a {
      color: var(--cp-text);
      text-decoration: none;
    }

    .content h3 a:hover {
      text-decoration: underline;
    }

    .content p {
      font-size: 12px;
      line-height: 1.6;
      color: var(--cp-text-muted);
      margin-bottom: 10px;
    }

    .content a {
      color: var(--cp-text-muted);
    }

    .content a:hover {
      color: var(--cp-accent);
    }

    .content ul {
      list-style: none;
      padding: 0;
    }

    .content ul li {
      font-size: 12px;
      line-height: 1.6;
      color: var(--cp-text-muted);
      margin-bottom: 8px;
      padding-left: 12px;
      position: relative;
    }

    .content ul li::before {
      content: '\25B2';
      position: absolute;
      left: 0;
      color: var(--cp-accent);
      font-size: 8px;
      top: 3px;
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--cp-border);
      margin: 16px 0;
    }

    .content em {
      font-size: 11px;
      color: var(--cp-text-soft);
    }

    .content strong a {
      color: var(--cp-text);
      text-decoration: none;
    }

    .content strong a:hover {
      text-decoration: underline;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 10px 0;
    }

    .content table th {
      text-align: left;
      background: var(--cp-surface-soft);
      padding: 6px 8px;
      font-size: 11px;
      color: var(--cp-text-muted);
      border-bottom: 1px solid var(--cp-border);
    }

    .content table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--cp-border);
    }

    /* Responsive */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--cp-border);
        padding: 12px;
      }
      .content { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Y</div>
    <h1><a href="./">Hacker News Digest</a></h1>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav class="cal-nav">
        <button id="prev-month">&larr;</button>
        <span class="cal-title" id="cal-title"></span>
        <button id="next-month">&rarr;</button>
      </nav>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="digest-list" id="digest-list"></div>
    </aside>

    <main class="content" id="content">
      <div class="empty-state">
        <span class="arrow">&larr;</span>
        Pick a date from the calendar to read a digest.
      </div>
    </main>
  </div>

  <script>
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const DAYS = ['Mo','Tu','We','Th','Fr','Sa','Su'];

    let availableDates = new Set();
    let currentYear, currentMonth, selectedDate;

    async function init() {
      try {
        const res = await fetch('digests/manifest.json');
        const dates = await res.json();
        dates.forEach(d => availableDates.add(d));
      } catch (e) {
        console.warn('Could not load manifest:', e);
      }

      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();

      const todayStr = fmt(today.getFullYear(), today.getMonth() + 1, today.getDate());
      if (availableDates.has(todayStr)) {
        loadDigest(todayStr);
      } else {
        const latest = [...availableDates].sort().reverse()[0];
        if (latest) {
          currentYear = parseInt(latest.split('-')[0], 10);
          currentMonth = parseInt(latest.split('-')[1], 10) - 1;
          loadDigest(latest);
        }
      }

      renderCalendar();
      renderRecentList();

      document.getElementById('prev-month').addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
      });
      document.getElementById('next-month').addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
      });
    }

    function fmt(y, m, d) {
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }

    function renderCalendar() {
      const grid = document.getElementById('cal-grid');
      const title = document.getElementById('cal-title');
      title.textContent = `${MONTHS[currentMonth]} ${currentYear}`;

      let html = DAYS.map(d => `<div class="day-header">${d}</div>`).join('');

      const firstDay = new Date(currentYear, currentMonth, 1);
      let startDay = firstDay.getDay() - 1;
      if (startDay < 0) startDay = 6;

      for (let i = 0; i < startDay; i++) {
        html += '<div class="day empty"></div>';
      }

      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const today = new Date();
      const todayStr = fmt(today.getFullYear(), today.getMonth() + 1, today.getDate());

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = fmt(currentYear, currentMonth + 1, d);
        const isToday = dateStr === todayStr;
        const hasDigest = availableDates.has(dateStr);
        const isSelected = dateStr === selectedDate;

        let cls = 'day';
        if (hasDigest) cls += ' has-digest';
        if (isToday) cls += ' today';
        if (isSelected) cls += ' selected';

        if (hasDigest) {
          html += `<div class="${cls}" data-date="${dateStr}" onclick="loadDigest('${dateStr}')">${d}</div>`;
        } else {
          html += `<div class="${cls}">${d}</div>`;
        }
      }

      grid.innerHTML = html;
    }

    function renderRecentList() {
      const list = document.getElementById('digest-list');
      const sorted = [...availableDates].sort().reverse().slice(0, 7);
      if (!sorted.length) { list.style.display = 'none'; return; }

      let html = '<h3>Recent</h3>';
      sorted.forEach(d => {
        const active = d === selectedDate ? ' active' : '';
        html += `<a href="#" class="${active}" onclick="event.preventDefault();loadDigest('${d}')">${d}</a>`;
      });
      list.innerHTML = html;
    }

    async function loadDigest(dateStr) {
      selectedDate = dateStr;
      renderCalendar();
      renderRecentList();

      const content = document.getElementById('content');
      content.innerHTML = '<p style="color:var(--cp-text-soft);font-size:12px;">Loading...</p>';

      try {
        const res = await fetch(`digests/${dateStr}.md`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = '<div class="empty-state">Digest not available for this date.</div>';
      }

      const newMonth = parseInt(dateStr.split('-')[1], 10) - 1;
      const newYear = parseInt(dateStr.split('-')[0], 10);
      if (newMonth !== currentMonth || newYear !== currentYear) {
        currentMonth = newMonth;
        currentYear = newYear;
        renderCalendar();
      }
    }

    init();
  </script>
</body>
</html>
